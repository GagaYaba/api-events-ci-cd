name: Pipeline CI API Events

on:
  push:
    branches:
      - main
      - integration
      - staging
  pull_request:
    branches:
      - main
      - integration
      - staging

jobs:
  tests-backend:
    runs-on: ubuntu-latest
    env:
      API_PASSWORD: ${{ secrets.API_PASSWORD }}
      DATABASE_URL: postgresql://test:test@localhost:5432/test
      NODE_ENV: test
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: test
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run lint
        run: npm run lint

      - name: Verifier service PostgreSQL
        run: |
          echo "Conteneurs Docker actifs :"
          docker ps --format "table {{.Names}}\t{{.Image}}\t{{.Status}}\t{{.Ports}}"

          POSTGRES_CONTAINER_ID=$(docker ps --filter "publish=5432" --format "{{.ID}}" | head -n 1)

          if [ -z "$POSTGRES_CONTAINER_ID" ]; then
            echo "ERREUR : aucun conteneur PostgreSQL expose sur le port 5432"
            exit 1
          fi

          echo "Conteneur PostgreSQL detecte : $POSTGRES_CONTAINER_ID"
          docker exec "$POSTGRES_CONTAINER_ID" pg_isready -U test -d test

      - name: Verifier les variables d'environnement
        run: |
          chmod +x scripts/check-env.sh
          ./scripts/check-env.sh

      - name: Run backend tests
        run: npm test -- --coverage

      - name: Upload rapport de tests
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-report-Integration
          path: coverage/
          retention-days: 7

  tests-frontend:
    runs-on: ubuntu-latest
    needs: tests-backend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run Playwright tests
        run: npm run test:e2e

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
