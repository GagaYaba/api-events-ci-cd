<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EVENTS.</title>
    <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800;900&family=Barlow:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --yellow: #c8d400;
            --teal: #009faa;
            --black: #0d0d0d;
            --dark: #1a1a1a;
            --mid: #2a2a2a;
            --white: #ffffff;
            --grey: #888;
        }

        body {
            font-family: 'Barlow', sans-serif;
            background: var(--black);
            color: var(--white);
            min-height: 100vh;
        }

        /* ── HEADER ── */
        header {
            background: var(--black);
            border-bottom: 1px solid #222;
            padding: 1rem 2.5rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .logo {
            font-family: 'Barlow Condensed', sans-serif;
            font-size: 1.8rem;
            font-weight: 900;
            letter-spacing: 0.08em;
            text-transform: uppercase;
        }

        .logo span { color: var(--yellow); }

        nav { display: flex; gap: 2rem; font-size: 0.85rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.12em; }
        nav a { color: var(--grey); text-decoration: none; transition: color 0.2s; }
        nav a:hover { color: var(--yellow); }

        /* ── HERO ── */
        .hero {
            background: var(--dark);
            border-bottom: 3px solid var(--yellow);
            padding: 3.5rem 2.5rem 3rem;
            display: flex;
            align-items: flex-end;
            justify-content: space-between;
            gap: 2rem;
        }

        .hero-text h1 {
            font-family: 'Barlow Condensed', sans-serif;
            font-size: clamp(3rem, 6vw, 5.5rem);
            font-weight: 900;
            text-transform: uppercase;
            line-height: 0.95;
        }

        .hero-text h1 .accent { color: var(--yellow); }
        .hero-text h1 .dot { color: var(--yellow); }

        .hero-text p {
            margin-top: 1rem;
            color: var(--grey);
            font-size: 0.95rem;
            max-width: 400px;
        }

        .hero-stat { text-align: right; flex-shrink: 0; }

        .hero-stat .num {
            font-family: 'Barlow Condensed', sans-serif;
            font-size: 4rem;
            font-weight: 900;
            color: var(--teal);
            line-height: 1;
        }

        .hero-stat .label {
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.15em;
            color: var(--grey);
        }

        /* ── MAIN LAYOUT ── */
        main {
            display: grid;
            grid-template-columns: 1fr 380px;
        }

        /* ── LIST PANEL ── */
        .list-panel {
            padding: 2.5rem;
            border-right: 1px solid #222;
        }

        .section-label {
            font-family: 'Barlow Condensed', sans-serif;
            font-size: 0.72rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.2em;
            color: var(--grey);
            margin-bottom: 1.5rem;
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }

        .section-label::after { content: ''; flex: 1; height: 1px; background: #2a2a2a; }

        .filters {
            display: flex;
            gap: 0.75rem;
            margin-bottom: 1.5rem;
            flex-wrap: wrap;
        }

        .filters select,
        .filters input[type="date"] {
            flex: 1;
            min-width: 130px;
            padding: 0.5rem 0.75rem;
            background: #111;
            border: 1px solid #333;
            border-top: 2px solid #333;
            color: var(--white);
            font-family: 'Barlow', sans-serif;
            font-size: 0.82rem;
            outline: none;
            border-radius: 0;
            appearance: none;
            cursor: pointer;
            transition: border-color 0.2s;
        }

        .filters select:focus,
        .filters input[type="date"]:focus { border-color: var(--yellow); border-top-color: var(--yellow); }
        .filters select option { background: #1a1a1a; }
        .filters input[type="date"]::-webkit-calendar-picker-indicator { filter: invert(0.4); cursor: pointer; }

        .btn-reset-filters {
            padding: 0.5rem 0.9rem;
            background: transparent;
            border: 1px solid #333;
            color: var(--grey);
            font-family: 'Barlow Condensed', sans-serif;
            font-size: 0.78rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            cursor: pointer;
            transition: border-color 0.2s, color 0.2s;
            white-space: nowrap;
        }

        .btn-reset-filters:hover { border-color: var(--yellow); color: var(--yellow); }

        .events-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 1px;
            background: #1e1e1e;
            border: 1px solid #1e1e1e;
        }

        .event-card {
            background: var(--dark);
            padding: 1.5rem;
            transition: background 0.2s;
            position: relative;
            overflow: hidden;
        }

        .event-card::before {
            content: '';
            position: absolute;
            top: 0; left: 0;
            width: 3px; height: 100%;
            background: var(--yellow);
            transform: scaleY(0);
            transition: transform 0.2s;
            transform-origin: bottom;
        }

        .event-card:hover { background: #212121; }
        .event-card:hover::before { transform: scaleY(1); }

        .event-id {
            font-family: 'Barlow Condensed', sans-serif;
            font-size: 0.7rem;
            font-weight: 700;
            color: var(--yellow);
            letter-spacing: 0.15em;
            margin-bottom: 0.5rem;
        }

        .event-title {
            font-family: 'Barlow Condensed', sans-serif;
            font-size: 1.5rem;
            font-weight: 800;
            text-transform: uppercase;
            line-height: 1.1;
            margin-bottom: 0.75rem;
        }

        .event-title .dot { color: var(--yellow); }

        .event-meta { display: flex; flex-wrap: wrap; gap: 0.4rem; margin-bottom: 1rem; }

        .tag {
            font-size: 0.72rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            padding: 0.25rem 0.6rem;
        }

        .tag-teal { background: var(--teal); color: var(--white); }
        .tag-dark { background: #333; color: var(--grey); }

        .event-info { font-size: 0.82rem; color: var(--grey); display: flex; gap: 1rem; }
        .event-info span { display: flex; align-items: center; gap: 0.3rem; }

        .event-img-wrapper {
            width: 100%;
            height: 160px;
            overflow: hidden;
            margin-bottom: 1rem;
        }

        .event-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            object-position: center;
            display: block;
        }

        .event-actions { margin-top: 1rem; display: flex; gap: 0.5rem; }

        .btn-icon {
            padding: 0.4rem 1rem;
            font-family: 'Barlow Condensed', sans-serif;
            font-size: 0.78rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            border: none;
            cursor: pointer;
            transition: all 0.15s;
        }

        .btn-icon.edit { background: transparent; border: 1px solid #444; color: var(--grey); }
        .btn-icon.edit:hover { border-color: var(--yellow); color: var(--yellow); }
        .btn-icon.del { background: transparent; border: 1px solid #444; color: var(--grey); }
        .btn-icon.del:hover { border-color: #e53e3e; color: #e53e3e; }

        .empty-state { padding: 3rem; text-align: center; color: #444; background: var(--dark); }
        .empty-state p { font-family: 'Barlow Condensed', sans-serif; font-size: 1.2rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.1em; }

        /* ── FORM PANEL ── */
        .form-panel {
            background: var(--dark);
            padding: 2.5rem;
            display: flex;
            flex-direction: column;
        }

        .form-header { margin-bottom: 2rem; }

        .form-header h2 {
            font-family: 'Barlow Condensed', sans-serif;
            font-size: 2rem;
            font-weight: 900;
            text-transform: uppercase;
            line-height: 1;
        }

        .form-header h2 .dot { color: var(--yellow); }
        .form-header p { margin-top: 0.5rem; font-size: 0.82rem; color: var(--grey); }

        .field { margin-bottom: 1rem; }

        .field label {
            display: block;
            font-family: 'Barlow Condensed', sans-serif;
            font-size: 0.72rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.15em;
            color: var(--grey);
            margin-bottom: 0.4rem;
        }

        .field input {
            width: 100%;
            padding: 0.75rem 1rem;
            background: #111;
            border: 1px solid #333;
            border-top: 2px solid #333;
            color: var(--white);
            font-family: 'Barlow', sans-serif;
            font-size: 0.92rem;
            transition: border-color 0.2s;
            outline: none;
            border-radius: 0;
            /* -webkit-appearance: none; */
        }

        .field input:focus { border-color: var(--yellow); border-top-color: var(--yellow); }
        .field input::placeholder { color: #444; }
        .field input[type="date"]::-webkit-calendar-picker-indicator { filter: invert(0.4); cursor: pointer; }
        .field input[type="file"] { padding: 0.5rem 1rem; cursor: pointer; color: var(--grey); }
        .field input[type="file"]::-webkit-file-upload-button { display: none; }

        .field select {
            width: 100%;
            padding: 0.75rem 1rem;
            background: #111;
            border: 1px solid #333;
            border-top: 2px solid #333;
            color: var(--white);
            font-family: 'Barlow', sans-serif;
            font-size: 0.92rem;
            transition: border-color 0.2s;
            outline: none;
            border-radius: 0;
            appearance: none;
            cursor: pointer;
        }

        .field select:focus { border-color: var(--yellow); border-top-color: var(--yellow); }
        .field select option { background: #1a1a1a; color: var(--white); }
        .img-preview { width: 100%; height: 120px; object-fit: cover; display: none; margin-top: 0.5rem; }
        .img-preview.visible { display: block; }

        .btn-submit {
            width: 100%;
            padding: 1rem;
            background: var(--yellow);
            color: var(--black);
            border: none;
            font-family: 'Barlow Condensed', sans-serif;
            font-size: 1rem;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 0.15em;
            cursor: pointer;
            transition: background 0.2s;
            margin-top: 0.5rem;
        }

        .btn-submit:hover { background: #d4e000; }

        .error-msg {
            padding: 0.75rem 1rem;
            background: rgba(229,62,62,0.1);
            border-left: 3px solid #e53e3e;
            color: #fc8181;
            font-size: 0.82rem;
            margin-top: 0.75rem;
            display: none;
        }

        /* ── MODAL ── */
        .modal-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.85);
            z-index: 200;
            align-items: center;
            justify-content: center;
        }

        .modal-overlay.open { display: flex; }

        .modal {
            background: var(--dark);
            border-top: 3px solid var(--yellow);
            padding: 2.5rem;
            width: 100%;
            max-width: 460px;
        }

        .modal h2 {
            font-family: 'Barlow Condensed', sans-serif;
            font-size: 1.8rem;
            font-weight: 900;
            text-transform: uppercase;
            margin-bottom: 1.5rem;
        }

        .modal h2 .dot { color: var(--yellow); }
        .modal .field input { background: #0d0d0d; }

        .modal-actions { display: flex; gap: 0.75rem; margin-top: 1.5rem; }

        .btn-cancel {
            flex: 1;
            padding: 0.85rem;
            background: transparent;
            border: 1px solid #333;
            color: var(--grey);
            font-family: 'Barlow Condensed', sans-serif;
            font-size: 0.9rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.12em;
            cursor: pointer;
            transition: border-color 0.2s, color 0.2s;
        }

        .btn-cancel:hover { border-color: var(--grey); color: var(--white); }

        .btn-save {
            flex: 2;
            padding: 0.85rem;
            background: var(--teal);
            border: none;
            color: var(--white);
            font-family: 'Barlow Condensed', sans-serif;
            font-size: 0.9rem;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 0.15em;
            cursor: pointer;
            transition: background 0.2s;
        }

        .btn-save:hover { background: #00b5c2; }

        .modal-error {
            padding: 0.6rem 0.8rem;
            background: rgba(229,62,62,0.1);
            border-left: 3px solid #e53e3e;
            color: #fc8181;
            font-size: 0.82rem;
            margin-top: 0.75rem;
            display: none;
        }

        @media (max-width: 768px) {
            main { grid-template-columns: 1fr; }
            .form-panel { border-top: 1px solid #222; }
            .hero { flex-direction: column; }
            .hero-stat { text-align: left; }
        }
    </style>
</head>
<body>

<header>
    <div class="logo">EVENT<span>S</span>.</div>
    <nav>
        <a href="#">Agenda</a>
        <a href="#">Organisateur</a>
        <a href="#">Contact</a>
    </nav>
</header>

<div class="hero">
    <div class="hero-text">
        <h1>Gérez vos<br><span class="accent">événements<span class="dot">.</span></span></h1>
        <p>Planifiez, modifiez et suivez tous vos événements en temps réel.</p>
    </div>
    <div class="hero-stat">
        <div class="num" id="heroCount">0</div>
        <div class="label">Événements actifs</div>
    </div>
</div>

<main>

    <div class="list-panel">
        <div class="section-label">Agenda en cours</div>
        <div class="filters">
            <select id="filterCategory" onchange="applyFilters()">
                <option value="">Toutes les catégories</option>
                <option value="Sport">Sport</option>
                <option value="Concert">Concert</option>
                <option value="Culture">Culture</option>
                <option value="Conférence">Conférence</option>
                <option value="Festival">Festival</option>
                <option value="Exposition">Exposition</option>
                <option value="Cinéma">Cinéma</option>
                <option value="Théâtre">Théâtre</option>
                <option value="Autre">Autre</option>
            </select>
            <input type="text" id="filterPlace" placeholder="Filtrer par lieu..." oninput="applyFilters()" style="flex:1;min-width:130px;padding:0.5rem 0.75rem;background:#111;border:1px solid #333;border-top:2px solid #333;color:var(--white);font-family:'Barlow',sans-serif;font-size:0.82rem;outline:none;border-radius:0;transition:border-color 0.2s;" onfocus="this.style.borderColor='var(--yellow)'" onblur="this.style.borderColor='#333'">
            <input type="date" id="filterDate" onchange="applyFilters()">
            <button class="btn-reset-filters" onclick="resetFilters()">✕ Réinitialiser</button>
        </div>
        <div class="events-grid" id="eventsGrid">
            <div class="empty-state"><p>Aucun événement planifié.</p></div>
        </div>
    </div>

    <div class="form-panel">
        <div class="form-header">
            <h2>Nouvel<br>événement<span class="dot">.</span></h2>
            <p>Tous les champs sont obligatoires.</p>
        </div>
        <div class="field">
            <label>Titre</label>
            <input type="text" id="title" placeholder="Ex : Forum Innovation 2026">
        </div>
        <div class="field">
            <label>Date</label>
            <input type="date" id="date">
        </div>
        <div class="field">
            <label>Catégorie</label>
            <select id="category">
                <option value="" disabled selected>Choisir une catégorie</option>
                <option value="Sport">Sport</option>
                <option value="Concert">Concert</option>
                <option value="Culture">Culture</option>
                <option value="Conférence">Conférence</option>
                <option value="Festival">Festival</option>
                <option value="Exposition">Exposition</option>
                <option value="Cinéma">Cinéma</option>
                <option value="Théâtre">Théâtre</option>
                <option value="Autre">Autre</option>
            </select>
        </div>
        <div class="field">
            <label>Lieu</label>
            <input type="text" id="place" placeholder="Ex : Toulouse, Paris...">
        </div>
        <div class="field">
            <label>Nb. participants</label>
            <input type="number" id="nbParticipants" placeholder="Ex : 500" min="1">
        </div>
        <div class="field">
            <label>Image (optionnelle)</label>
            <input type="file" id="image" accept="image/*" onchange="previewImage(this, 'imagePreview')">
            <img id="imagePreview" class="img-preview" alt="Aperçu">
        </div>
        <button class="btn-submit" onclick="addEvent()">Ajouter l'événement →</button>
        <div class="error-msg" id="createError"></div>
    </div>

</main>

<div class="modal-overlay" id="editModal">
    <div class="modal">
        <h2>Modifier<span class="dot">.</span></h2>
        <input type="hidden" id="editId">
        <div class="field"><label>Titre</label><input type="text" id="editTitle"></div>
        <div class="field"><label>Date</label><input type="date" id="editDate"></div>
        <div class="field"><label>Catégorie</label><select id="editCategory"><option value="" disabled>Choisir une catégorie</option><option value="Sport">Sport</option><option value="Concert">Concert</option><option value="Culture">Culture</option><option value="Conférence">Conférence</option><option value="Festival">Festival</option><option value="Exposition">Exposition</option><option value="Cinéma">Cinéma</option><option value="Théâtre">Théâtre</option><option value="Autre">Autre</option></select></div>
        <div class="field"><label>Lieu</label><input type="text" id="editPlace"></div>
        <div class="field"><label>Nb. participants</label><input type="number" id="editNbParticipants" min="1"></div>
        <div class="field"><label>Image (optionnelle)</label><input type="file" id="editImage" accept="image/*" onchange="previewImage(this, 'editImagePreview')"><img id="editImagePreview" class="img-preview" alt="Aperçu"></div>
        <div class="modal-error" id="editError"></div>
        <div class="modal-actions">
            <button class="btn-cancel" onclick="closeModal()">Annuler</button>
            <button class="btn-save" onclick="saveEdit()">Enregistrer →</button>
        </div>
    </div>
</div>

<script>
    const API = '/events';
    let allEvents = [];

    async function loadEvents() {
        const res = await fetch(API);
        allEvents = await res.json();
        document.getElementById('heroCount').textContent = allEvents.length;
        applyFilters();
    }

    function applyFilters() {
        const cat = document.getElementById('filterCategory').value;
        const place = document.getElementById('filterPlace').value.trim().toLowerCase();
        const date = document.getElementById('filterDate').value;
        const filtered = allEvents.filter(e => {
            if (cat && e.category !== cat) return false;
            if (place && !e.place.toLowerCase().includes(place)) return false;
            if (date && e.date.substring(0, 10) !== date) return false;
            return true;
        });
        renderGrid(filtered);
    }

    function resetFilters() {
        document.getElementById('filterCategory').value = '';
        document.getElementById('filterPlace').value = '';
        document.getElementById('filterDate').value = '';
        renderGrid(allEvents);
    }

    function formatDate(dateStr) {
        return new Date(dateStr).toLocaleDateString('fr-FR', { day: '2-digit', month: 'short', year: 'numeric' });
    }

    function renderGrid(events) {
        const grid = document.getElementById('eventsGrid');
        if (events.length === 0) {
            grid.innerHTML = '<div class="empty-state"><p>Aucun événement planifié.</p></div>';
            return;
        }
        grid.innerHTML = events.map(e => `
            <div class="event-card">
                ${e.imageUrl ? `<div class="event-img-wrapper"><img class="event-img" src="${e.imageUrl}" alt="${e.title}"></div>` : ''}
                <div class="event-id">N° ${String(e.id).padStart(3, '0')}</div>
                <div class="event-title">${e.title}<span class="dot">.</span></div>
                <div class="event-meta">
                    <span class="tag tag-teal">${e.category}</span>
                    <span class="tag tag-dark">${e.place}</span>
                </div>
                <div class="event-info">
                    <span>📅 ${formatDate(e.date)}</span>
                    <span>👥 ${e.nbParticipants}</span>
                </div>
                <div class="event-actions">
                    <button class="btn-icon edit" onclick="openEdit(${e.id}, '${encodeURIComponent(e.title)}', '${e.date}', '${encodeURIComponent(e.category)}', '${encodeURIComponent(e.place)}', ${e.nbParticipants}, '${e.imageUrl || ''}')">Modifier</button>
                    <button class="btn-icon del" onclick="deleteEvent(${e.id})">Supprimer</button>
                </div>
            </div>
        `).join('');
    }

    function previewImage(input, previewId) {
        const preview = document.getElementById(previewId);
        if (input.files && input.files[0]) {
            preview.src = URL.createObjectURL(input.files[0]);
            preview.classList.add('visible');
        } else {
            preview.classList.remove('visible');
        }
    }

    async function addEvent() {
        const errEl = document.getElementById('createError');
        errEl.style.display = 'none';
        const formData = new FormData();
        formData.append('title', document.getElementById('title').value.trim());
        formData.append('date', document.getElementById('date').value);
        formData.append('category', document.getElementById('category').value.trim());
        formData.append('place', document.getElementById('place').value.trim());
        formData.append('nbParticipants', document.getElementById('nbParticipants').value);
        const imageFile = document.getElementById('image').files[0];
        if (imageFile) formData.append('image', imageFile);
        try {
            const res = await fetch(API, { method: 'POST', body: formData });
            if (!res.ok) {
                const err = await res.json();
                errEl.textContent = err.error;
                errEl.style.display = 'block';
                return;
            }
            ['title', 'date', 'category', 'place', 'nbParticipants', 'image'].forEach(id => document.getElementById(id).value = '');
            document.getElementById('imagePreview').classList.remove('visible');
            loadEvents();
        } catch (e) {
            errEl.textContent = 'Erreur réseau : impossible de contacter le serveur.';
            errEl.style.display = 'block';
        }
    }

    async function deleteEvent(id) {
        if (!confirm('Supprimer cet événement ?')) return;
        await fetch(`${API}/${id}`, { method: 'DELETE' });
        loadEvents();
    }

    function openEdit(id, title, date, category, place, nbParticipants, imageUrl) {
        document.getElementById('editId').value = id;
        document.getElementById('editTitle').value = decodeURIComponent(title);
        document.getElementById('editDate').value = date.substring(0, 10);
        document.getElementById('editCategory').value = decodeURIComponent(category);
        document.getElementById('editPlace').value = decodeURIComponent(place);
        document.getElementById('editNbParticipants').value = nbParticipants;
        document.getElementById('editImage').value = '';
        const preview = document.getElementById('editImagePreview');
        if (imageUrl) {
            preview.src = imageUrl;
            preview.classList.add('visible');
        } else {
            preview.classList.remove('visible');
        }
        document.getElementById('editError').style.display = 'none';
        document.getElementById('editModal').classList.add('open');
    }

    function closeModal() {
        document.getElementById('editModal').classList.remove('open');
    }

    async function saveEdit() {
        const errEl = document.getElementById('editError');
        errEl.style.display = 'none';
        const id = document.getElementById('editId').value;
        const formData = new FormData();
        formData.append('title', document.getElementById('editTitle').value.trim());
        formData.append('date', document.getElementById('editDate').value);
        formData.append('category', document.getElementById('editCategory').value.trim());
        formData.append('place', document.getElementById('editPlace').value.trim());
        formData.append('nbParticipants', document.getElementById('editNbParticipants').value);
        const imageFile = document.getElementById('editImage').files[0];
        if (imageFile) formData.append('image', imageFile);
        const res = await fetch(`${API}/${id}`, { method: 'PUT', body: formData });
        if (!res.ok) {
            const err = await res.json();
            errEl.textContent = err.error;
            errEl.style.display = 'block';
            return;
        }
        closeModal();
        loadEvents();
    }

    document.getElementById('editModal').addEventListener('click', function(e) {
        if (e.target === this) closeModal();
    });

    loadEvents();
</script>
</body>
</html>
